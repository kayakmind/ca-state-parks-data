name: Scrape CA State Parks

on:
  # Run on the 1st of every month at 6am UTC
  schedule:
    - cron: '0 6 1 * *'

  # Manual trigger from GitHub UI (or phone via GitHub app)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit number of parks (0 = all)'
        required: false
        default: '0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Grant write permission so we can commit results back
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scrape_ca_parks.py \
            --output data/ca_state_parks.json \
            --delay 1.0 \
            --limit ${{ github.event.inputs.limit || '0' }} \
            --verbose

      - name: Commit JSON data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ca_state_parks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🏕️ Update CA State Parks data — $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Upload JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ca-state-parks-data
          path: data/ca_state_parks.json
          retention-days: 90
