name: Enrich CA State Parks

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Geocode CA State Parks"]
    types: [completed]

jobs:
  enrich:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Enrich with ReserveCalifornia data
        run: python enrich_reservecalifornia.py --threshold 0.80

      - name: Commit enriched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ca_state_parks_enriched.json
          git diff --staged --quiet || git commit -m "🏕️ Update enriched CA State Parks data — $(date -u +%Y-%m-%d)"
          git push
